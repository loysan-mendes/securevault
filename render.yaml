services:
  - type: web
    name: securevault
    runtime: python
    region: oregon          # or: frankfurt, singapore, ohio
    plan: free              # upgrade to 'starter' for persistent disk

    # Build: install Python dependencies
    buildCommand: pip install -r requirements.txt

    # Start: run gunicorn for production
    startCommand: gunicorn -w 2 -k uvicorn.workers.UvicornWorker app.main:app --bind 0.0.0.0:${PORT}

    # Point code at the right working directory
    rootDir: .

    # Health check — Render pings this to know the service is up
    healthCheckPath: /

    # Environment variables set at deploy time
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0

      - key: SECRET_KEY
        generateValue: true        # Render auto-generates a secure random value ✅

      - key: DEBUG
        value: false

      - key: DATABASE_URL
        value: sqlite:///./securevault.db

      - key: VAULT_DIR
        value: ./vault_data

      - key: MAX_FILE_SIZE_MB
        value: "50"

      - key: SESSION_MAX_AGE
        value: "3600"

      - key: LOGIN_RATE_LIMIT
        value: "5/minute"

      - key: REGISTER_RATE_LIMIT
        value: "3/minute"

      - key: UPLOAD_RATE_LIMIT
        value: "10/minute"

services:
  securevault:
    build: .
    restart: always
    environment:
      - SECRET_KEY=${SECRET_KEY}
      - VAULT_DIR=/data/vault
      - DATABASE_URL=sqlite:////data/securevault.db
      - DEBUG=false
      - MAX_FILE_SIZE_MB=50
    volumes:
      - vault_data:/data          # Persistent encrypted files + SQLite DB
    ports:
      - "127.0.0.1:8000:8000"    # Only expose to localhost (nginx proxies)

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - certbot_certs:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    depends_on:
      - securevault

  certbot:
    image: certbot/certbot
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    # Run once to get cert: docker compose run certbot certonly --webroot ...

volumes:
  vault_data:      # Persistent volume survives container restarts
  certbot_certs:
  certbot_www:

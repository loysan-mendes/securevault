<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}SecureVault{% endblock %}</title>
    <meta name="description" content="SecureVault — AES-256 encrypted file storage with zero plaintext exposure">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="/static/css/main.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="nav-brand">
                <i class="fas fa-shield-halved"></i>
                <span>SecureVault</span>
            </a>
            <div class="nav-links">
                {% if user %}
                    <a href="/vault" class="nav-link"><i class="fas fa-folder-locked"></i> My Vault</a>
                    <a href="/audit" class="nav-link"><i class="fas fa-list-check"></i> Audit Log</a>
                    <form action="/logout" method="post" style="display:inline">
                        <button type="submit" class="btn btn-ghost btn-sm">
                            <i class="fas fa-right-from-bracket"></i> Logout
                        </button>
                    </form>
                {% else %}
                    <a href="/login" class="nav-link">Login</a>
                    <a href="/register" class="btn btn-primary btn-sm">Get Started</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <div class="footer-inner">
            <span><i class="fas fa-lock"></i> AES-256-GCM &bull; PBKDF2 (600k iterations) &bull; Zero plaintext storage</span>
        </div>
    </footer>

    <script src="/static/js/main.js"></script>
</body>
</html>
